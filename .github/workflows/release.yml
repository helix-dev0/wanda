name: release

# Cut a release by pushing a version tag:  git tag v0.2.1 && git push origin v0.2.1
# Ships SELF-CONTAINED LAUNCHERS (no installers) into a DRAFT release:
#   • Linux:   .AppImage  — bundles its own deps, run it directly (the portable Linux format).
#   • Windows: a portable .exe — the raw binary (needs WebView2, preinstalled on Win10/11).
# plus the capture-mod zip. Review + publish the draft by hand. (Private repo: the default
# GITHUB_TOKEN is enough — no signing.)
on:
  push:
    tags:
      - 'v*'

jobs:
  # Linux: tauri-action builds the portable AppImage AND creates the draft release.
  linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage + draft release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Wand Grimoire ${{ github.ref_name }}
          releaseBody: |
            Self-contained launchers — no installer, just run them:
            - Linux: the `.AppImage` — `chmod +x` it, then run (bundles its own deps).
            - Windows: `Wand-Grimoire_x64_portable.exe` — double-click to launch
              (needs the WebView2 runtime, preinstalled on Win10/11).
            For live in-game analysis, also grab `wand-capture-mod.zip` and install it
            into Noita's mods folder (see the README).
          releaseDraft: true
          prerelease: false

  # Windows: tauri-action can't publish a binary-only build ("No artifacts were found"), so
  # build the standalone exe directly with --no-bundle and upload it to the draft the linux
  # job created (needs: linux guarantees the release already exists).
  windows:
    needs: linux
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build standalone exe (no installer)
        run: npm run tauri build -- --no-bundle

      - name: Upload portable Windows exe to the draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          exe=$(find src-tauri/target/release -maxdepth 1 -name '*.exe' | head -n1)
          echo "portable binary: $exe"
          cp "$exe" "Wand-Grimoire_x64_portable.exe"
          gh release upload "${{ github.ref_name }}" "Wand-Grimoire_x64_portable.exe" --clobber

  # Attach the capture-mod zip to the same draft once both launchers are built.
  upload-mod:
    needs: [linux, windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Build mod zip
        run: npm run package:mod
      - name: Upload mod zip to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" wand-capture-mod.zip --clobber
